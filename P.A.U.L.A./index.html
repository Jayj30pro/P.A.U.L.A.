<!DOCTYPE html>

<html>
    <head>
        <title> P.A.U.L.A. </title>
        <style>
            body {
                background-color: #222;
                color: #FFF;
                font-family: 'Times New Roman', Times, serif;
            }
            header {
                font-size: 40px;
            }
            a {
                color: #B05;
            }

            #main-window {
                width: 100%;
                display: flex;
                height: auto;
                justify-content: space-evenly;
            }

           #list-area {
            height: 300px;
            width: 40%;
            background-color: #dfdfdf;
            color: #032;
           }

           #work-area {
            height: 300px;
            width: 40%;
            background-color: #dfdfdf;
            color: #032;
           }

           #to-do{
            font-size: 15px;
           }
           #about-app {
            font-size: 16px;
           }
           .title{
            font-size: 25px;
            color: #50B;
           }
           button {
            padding: 5px;
            margin: 10px;
            font-size: 15px;
            border: 7px double #076;
            color: #000;
            background: #0AC;
            border-radius: 5%;
           }
        </style>
    </head>
    <body>
        <header>
            <p align="center">Hi I'm Paula</p>
        </header>
        <div align="center">
            <div id="main-window">
                <div id="list-area">
                    <p class="title"> To-do List</p>
                    <p id="contents"> Nothing Yet </p>
                </div>
                <div id="work-area">
                    <p class="title"> Information</p>
                    <p id="info"> Nothing Yet </p>
                </div>
            </div>
            <p> What needs to get done? </p>
            <input id="to-do" type="text"/>
            <br/><br/>
            <button onclick="addList()"> Add a new item </button>
            <button onclick="getList()"> Check the list </button>
            <button onclick="clearScreen()"> Clear screen </button>
        </div>
        <br/><br/><br/><br/><br/>
        <a href="about.html"> <p align="center" id="about-app"> about P.A.U.L.A.</p></a>
        <script>
            
            let doList = [];
            let onScreen = document.getElementById("contents");
            let doIt = document.getElementById("to-do"); 

            function clearScreen() {
                onScreen.innerHTML = "";
            }

            function addList() {
                if (doIt.value == "") {
                    onScreen.innerHTML = "I don't see anything"; //if blank
                }

                else {
                    doList.push(doIt.value);
                    getList();
                    doIt.value = "";
                }
            }
            
            //display current list items if empty display an encouraging message

            function getList() {
                if (doList.length == 0) {
                    onScreen.innerHTML = "We are just getting started";
                }
                else {
                    let betterString = "";
                    let dipList = [];
                    for (let i =0; i < doList.length; i++) {
                        dipList.push(doList[i]);
                        dipList.push("<br/>");
                        betterString = dipList.join(" ");
                    }
                    onScreen.innerHTML = betterString;
                }
            }
        </script>
    </body>
</html>
