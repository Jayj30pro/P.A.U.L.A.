<!DOCTYPE html>

<html>
    <head>
        <title> P.A.U.L.A. </title>
        <style>
            header {
                font-size: 40px;
            }
           #work-area {
            height: 500px;
            width: 80%;
            background-color: #CCC;
            
           }
           button {
            padding: 5px;
            margin: 10px;
            border: 7px double #00F;
            color: #FFF;
            background: #706;
           }
        </style>
    </head>
    <body>
        <header>
            <p align="center">Hi I'm Paula</p>
        </header>
        <div align="center">
            <div id="work-area">
                <p id="contents"> Nothing Yet </p>
            </div>
            <p> What needs to get done? </p>
            <input id="to-do" type="text"/>
            <br/>
            <button> Add a new item </button>
            <button onclick="getList()"> Check the list </button>
        </div>
        <br/><br/><br/><br/><br/>
        <script>
            let doList = ["eggs","milk","hyper","bacon"];
            let onScreen = document.getElementById("contents");
            
            function getList() {
                if (doList.length == 0) {
                    onScreen.innerHTML = "We are just getting started";
                }
                else {
                    let dipList = [];
                    for (let i =0; i < doList.length; i++) {
                        dipList.push(doList[i]);
                        dipList.push("<br/>");
                    }
                    onScreen.innerHTML = dipList;
                }
            }
        </script>
    </body>
</html>
